<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Pessoal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #FFDCA8;
            color: #D90000;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            border: 5px solid #ffbb00; 
        }

        main {
            background-color: #D90000;
            color: #FFDCA8;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            border: 5px solid #f1a282; 
        } 
        
        .logo-volei {
            width: 80px;
            height: 80px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Minha página pessoal</h1>
        <p>Minhas experiências no vôlei</p>
    </header>
    <main>
        <img src="imagem-blog.png" class="logo-volei" alt="Ícone estilizado de uma bola de vôlei em movimento com o traçado de uma mão abaixo dela, em tom bege claro (#FFDCA8) centralizado sobre um fundo totalmente vermelho sólido (#D90000).">
        
        <h2>As primeiras impressões</h2>
        <p>Bem-vindos! Aqui vou compartilhar minhas primeiras impressões sobre o vôlei</p>
        <p>Por: Caio Felipe</p>
    </main>
</body>
</html>
